<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديميتي - منصتي التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6; /* أزرق فاتح عصري */
            --bg-color: #f8fafc; /* خلفية فاتحة هادئة */
            --sidebar-bg: #1e293b; /* قائمة جانبية غامقة */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-side: #e2e8f0;
            --accent-color: #fbbf24; /* أصفر دافئ للتفاعل */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 280px;
            height: 100%;
            background-color: var(--sidebar-bg);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar h2 {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-side);
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-color);
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex-grow: 1;
            padding: 50px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
        }

        .btn-upload {
            background: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }

        .btn-upload:hover {
            background: #2563eb;
        }

        /* بطاقات الإحصائيات */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            font-size: 40px;
            color: var(--primary-color);
        }

        .stat-details h3 {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-details p {
            color: #64748b;
        }

        /* قسم الفيديوهات */
        .video-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .video-section h3 {
            margin-bottom: 25px;
            font-size: 24px;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #475569;
            cursor: pointer;
            transition: color 0.3s;
        }

        .video-placeholder:hover {
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>أكاديميتي</h2>
        <div class="nav-items">
            <div class="nav-item active"><i class="fas fa-home"></i> الرئيسة</div>
            <div class="nav-item"><i class="fas fa-play-circle"></i> دروسي</div>
            <div class="nav-item"><i class="fas fa-users"></i> طلابي</div>
            <div class="nav-item"><i class="fas fa-chart-bar"></i> التقارير</div>
            <div class="nav-item"><i class="fas fa-cog"></i> الإعدادات</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>مرحباً بك، دكتور أحمد 👋</h1>
            <button class="btn-upload">نشر درس جديد</button>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-details">
                    <h3>150</h3>
                    <p>طالب مشترك</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-book-open"></i></div>
                <div class="stat-details">
                    <h3>12</h3>
                    <p>كورس متاح</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-details">
                    <h3>4.9</h3>
                    <p>تقييم الطلاب</p>
                </div>
            </div>
        </div>

        <div class="video-section">
            <h3>أحدث درس مرفوع: "أساسيات تصميم المنصات التعليمية"</h3>
            <div class="video-placeholder">
                <i class="fas fa-play"></i>
                <p style="margin-right: 15px;">الفيديو جاهز للعرض</p>
            </div>
        </div>
    </div>

</body>
</html>
