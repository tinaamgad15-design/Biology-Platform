<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مينا التعليمية | V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #22d3ee, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-slate-700">
        <h1 class="text-2xl font-bold gradient-text">MINA ACADEMY</h1>
        <div id="userInfo" class="text-sm text-slate-400"></div>
    </nav>

    <div id="loginView" class="max-w-md mx-auto mt-20 p-8 glass rounded-3xl shadow-2xl transition-all">
        <h2 class="text-3xl font-bold text-center mb-8">تسجيل الدخول</h2>
        <input id="phone" type="text" placeholder="رقم الموبايل" class="w-full p-4 mb-4 rounded-xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none">
        <input id="pass" type="password" placeholder="كلمة السر" class="w-full p-4 mb-6 rounded-xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none">
        <button onclick="auth()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-105">دخول</button>
    </div>

    <div id="adminView" class="hidden p-8 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-4 gap-8">
            <div class="glass p-6 rounded-2xl h-fit">
                <h3 class="font-bold mb-4 text-cyan-400">إضافة درس جديد</h3>
                <input id="title" type="text" placeholder="عنوان الدرس" class="w-full p-3 mb-3 rounded-lg bg-slate-800 border border-slate-700">
                <input id="url" type="text" placeholder="لينك يوتيوب" class="w-full p-3 mb-4 rounded-lg bg-slate-800 border border-slate-700">
                <button onclick="addLesson()" class="w-full bg-green-600 py-3 rounded-lg font-bold">نشر الآن</button>
            </div>
            <div class="md:col-span-3">
                <h3 class="font-bold mb-4">الدروس الحالية على السيرفر</h3>
                <div id="adminList" class="grid gap-4"></div>
            </div>
        </div>
    </div>

    <div id="studentView" class="hidden p-8 max-w-7xl mx-auto">
        <div id="lessonsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        // السيرفر الوهمي (باستخدام ذاكرة المتصفح حالياً لضمان العمل المجاني 100%)
        let lessons = JSON.parse(localStorage.getItem('mina_cloud_db')) || [];

        function auth() {
            const p = document.getElementById('phone').value;
            const s = document.getElementById('pass').value;

            if(p === "000" && s === "111") {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('adminView').classList.remove('hidden');
                document.getElementById('userInfo').innerText = "وضع المدرس 🛠️";
                renderAdmin();
            } else if(p !== "" && s !== "") {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('studentView').classList.remove('hidden');
                document.getElementById('userInfo').innerText = "حساب طالب 🎓";
                renderStudent();
            }
        }

        function addLesson() {
            const t = document.getElementById('title').value;
            let u = document.getElementById('url').value;
            if(!t || !u) return alert("املا البيانات");

            if(u.includes("watch?v=")) u = u.replace("watch?v=", "embed/");
            
            lessons.push({id: Date.now(), title: t, url: u});
            localStorage.setItem('mina_cloud_db', JSON.stringify(lessons));
            renderAdmin();
            alert("تم الرفع للسيرفر!");
        }

        function renderAdmin() {
            const list = document.getElementById('adminList');
            list.innerHTML = lessons.map(l => `
                <div class="flex justify-between p-4 glass rounded-xl">
                    <span>${l.title}</span>
                    <button onclick="deleteL(${l.id})" class="text-red-400 font-bold">حذف</button>
                </div>
            `).join('');
        }

        function renderStudent() {
            const grid = document.getElementById('lessonsGrid');
            grid.innerHTML = lessons.map(l => `
                <div class="glass rounded-3xl overflow-hidden shadow-xl hover:border-cyan-500/50 border border-transparent transition">
                    <iframe class="w-full aspect-video" src="${l.url}" frameborder="0" allowfullscreen></iframe>
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2">${l.title}</h3>
                        <p class="text-slate-400 text-sm">شرح حصري لمنصة المستر مينا</p>
                    </div>
                </div>
            `).join('');
        }

        function deleteL(id) {
            lessons = lessons.filter(l => l.id !== id);
            localStorage.setItem('mina_cloud_db', JSON.stringify(lessons));
            renderAdmin();
        }
    </script>
</body>
</html>
